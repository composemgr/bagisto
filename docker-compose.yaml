# nginx proxy address - http://172.17.0.1:8082

name: bagisto
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  bagisto:
    image: bagisto/bagisto:latest
    pull_policy: always
    container_name: bagisto-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    logging: *default-logging
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://bagisto-app:80'
      - 'cloudflare.hostname=bagisto.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.bagisto-app.entrypoints=http'
      - 'traefik.http.routers.bagisto-app-secure.tls=true'
      - 'traefik.http.routers.bagisto-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.bagisto-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.bagisto-app.middlewares=bagisto-app-https-redirect'
      - 'traefik.http.routers.bagisto-app-secure.entrypoints=https'
      - 'traefik.http.routers.bagisto-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.bagisto-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.bagisto-app-secure.service=bagisto-app'
      - 'traefik.http.services.bagisto-app.loadbalancer.server.port=80'
    networks:
      - bagisto
      - proxy
      - cloudflare
    ports:
      - "172.17.0.1:8082:80"
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: bagisto-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      APP_URL: https://${BASE_HOST_NAME:-$HOSTNAME}
      APP_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      DB_CONNECTION: mysql
      DB_HOST: bagisto-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_CREATE_DATABASE_NAME:-bagisto}
      DB_USERNAME: ${DB_USER_NAME:-bagisto}
      DB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      ADMIN_NAME: ${APP_ADMIN_USER:-admin}
      ADMIN_EMAIL: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-example.com}
      ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
      MAIL_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      MAIL_PORT: ${EMAIL_SERVER_PORT:-587}
      MAIL_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      MAIL_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
    volumes:
      - ./volumes/data/bagisto:/var/www/html/storage
    depends_on:
      bagisto-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  bagisto-db:
    image: mariadb:latest
    pull_policy: always
    container_name: bagisto-db
    hostname: bagisto-db
    restart: always
    logging: *default-logging
    networks:
      - bagisto
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: bagisto-db
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-bagisto}
      MARIADB_USER: ${DB_USER_NAME:-bagisto}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mariadb/bagisto:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bagisto:
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
